name: Test IndicTrans2
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -q torch --index-url https://download.pytorch.org/whl/cpu
          pip install -q transformers sentencepiece IndicTransToolkit
      - name: Run translation test
        run: python test_it2.py